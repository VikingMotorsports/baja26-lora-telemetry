[platformio]
# Tells PlatformIO where CubeMX put the source and header files
src_dir = Core/Src
include_dir = Core/Inc

[env:nucleo_f303k8]
platform = ststm32
board = nucleo_f303k8
framework = stm32cube
monitor_speed = 38400

# Forces PlatformIO to compile the extra startup and driver files generated by CubeMX
build_flags =
    -ICore/Inc
    -IDrivers/STM32F3xx_HAL_Driver/Inc
    -IDrivers/STM32F3xx_HAL_Driver/Inc/Legacy
    -IDrivers/CMSIS/Device/ST/STM32F3xx/Include
    -IDrivers/CMSIS/Include

# Automatically includes the HAL driver C files in the compilation path
build_src_filter =
    +<*>
    +<../Drivers/STM32F3xx_HAL_Driver/Src>